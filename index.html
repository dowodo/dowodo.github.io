<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단 쇼핑몰 연습</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f9;
      color: #222;
    }

    header {
      background: white;
      border-bottom: 1px solid #e5e5e5;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .cart-box {
      font-size: 16px;
      font-weight: bold;
    }

    .hero {
      max-width: 1100px;
      margin: 30px auto 10px;
      padding: 0 20px;
    }

    .hero-banner {
      background: linear-gradient(135deg, #ffffff, #eef3ff);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .hero-banner h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .hero-banner p {
      margin: 0;
      color: #555;
      line-height: 1.6;
    }

    main {
      max-width: 1100px;
      margin: 20px auto 50px;
      padding: 0 20px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .image {
      height: 220px;
      background: #dfe7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #5a6a85;
    }

    .card-body {
      padding: 18px;
    }

    .product-name {
      font-size: 18px;
      font-weight: bold;
      margin: 0 0 8px;
    }

    .product-desc {
      font-size: 14px;
      color: #666;
      margin: 0 0 14px;
      line-height: 1.5;
      min-height: 42px;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      border: none;
      background: #222;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">LAONE SHOP</div>
    <div class="cart-box">장바구니: <span id="cart-count">0</span></div>
  </header>

  <section class="hero">
    <div class="hero-banner">
      <h1>메롱메롱 우왕좌왕</h1>
      <p>으하하하하하하 캬캬캬캬캬캬캬캬캭</p>
    </div>
  </section>

  <main>
    <div class="product-grid">
      <div class="card">
        <div class="image">상품 이미지</div>
        <div class="card-body">
          <h2 class="product-name">기저귀 세트</h2>
          <p class="product-desc">부드럽고 편안한 데일리 기저귀 세트입니다.</p>
          <div class="price">18,000원</div>
          <a href="detail.html?name=기저귀 세트&price=18000">
            <button>상세보기</button>
          </a>
          <button onclick="addToCart('기저귀 세트')">장바구니 담기</button>
        </div>
      </div>

      <div class="card">
        <div class="image">상품 이미지</div>
        <div class="card-body">
          <h2 class="product-name">젖병 2개입</h2>
          <p class="product-desc">신생아용으로 사용하기 좋은 기본 젖병 세트입니다.</p>
          <div class="price">12,000원</div>
          <a href="detail.html?name=젖병 2개입&price=12000">
            <button>상세보기</button>
          </a>
          <button onclick="addToCart('젖병 2개입')">장바구니 담기</button>
        </div>
      </div>

      <div class="card">
        <div class="image">상품 이미지</div>
        <div class="card-body">
          <h2 class="product-name">아기 물티슈</h2>
          <p class="product-desc">순한 성분으로 부담 없이 사용할 수 있는 물티슈입니다.</p>
          <div class="price">6,500원</div>
          <a href="detail.html?name=아기 물티슈&price=6500">
            <button>상세보기</button>
          </a>
          <button onclick="addToCart('아기 물티슈')">장바구니 담기</button>
        </div>
      </div>
    </div>
    <h2>장바구니 목록</h2>
    <button onclick="clearCart()">장바구니 비우기</button>
    <ul id="cart-list"></ul>
  </main>

  <script>
    let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
    let cartCount = cartItems.length;

    // 처음 화면에 숫자 표시 + 목록 표시
    document.getElementById("cart-count").textContent = cartCount;
    renderCart();

    // 장바구니 추가
    function addToCart(productName) {
      cartItems.push(productName);
      cartCount = cartItems.length;

      localStorage.setItem("cartItems", JSON.stringify(cartItems));

      document.getElementById("cart-count").textContent = cartCount;
      renderCart();

      alert(productName + " 잘 샀어요! 후회없으실 거에요!.");
    }

    // 장바구니 목록 그리기
    function renderCart() {
      const cartList = document.getElementById("cart-list");
      cartList.innerHTML = "";

      for (let i = 0; i < cartItems.length; i++) {
        const li = document.createElement("li");
        li.textContent = cartItems[i];
        cartList.appendChild(li);
      }
    }

    // 장바구니 비우기
    function clearCart() {
      cartItems = [];
      cartCount = 0;

      localStorage.setItem("cartItems", JSON.stringify(cartItems));

      document.getElementById("cart-count").textContent = 0;
      renderCart();
    }
